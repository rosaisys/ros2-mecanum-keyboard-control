# 智能车键盘控制示例参数配置文件
# 按节点名分组，launch 统一加载这一份配置

ros_robot_controller:
  ros__parameters:
    imu_frame: imu_link

speed_publisher:
  ros__parameters:
    command_topic: cmd_vel
    control_mode_service: set_control_mode
    robot_type: ""
    queue_depth: 10
    publish_rate: 100.0
    default_linear_velocity: 0.2
    default_angular_velocity: 0.5
    acceleration_limit: 2.5
    angular_acceleration_limit: 4.0
    ackermann_wheelbase: 0.213
    ackermann_steering_angle: 0.628
    stop_threshold_linear: 0.002
    stop_threshold_angular: 0.005
    publish_threshold_linear: 0.0001
    publish_threshold_angular: 0.0002

speed_subscriber:
  ros__parameters:
    command_topic: cmd_vel
    motor_topic: ros_robot_controller/set_motor
    wheelbase: 0.216
    track_width: 0.195
    wheel_diameter: 0.097
    max_linear_x: 0.5
    max_linear_y: 0.2
    max_angular_z: 0.5
    queue_depth: 10

control_mode_client:
  ros__parameters:
    service_name: set_control_mode
